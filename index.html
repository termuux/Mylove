<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposal App</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e8306e",
              "background-light": "#f8f6f6",
              "background-dark": "#211116",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              romantic: ["Dancing Script", "cursive"],
              script: ["Dancing Script", "cursive"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
      }

      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(12px) scale(0.99);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .animate-fade-up {
        animation: fadeUp 520ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        will-change: transform, opacity;
      }

      @keyframes floatSoft {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .animate-float-soft {
        animation: floatSoft 6s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="font-display bg-background-light dark:bg-background-dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
